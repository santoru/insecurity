<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body>

    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <a href="#" id="scrollTop" aria-label="Scroll to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 15-6-6-6 6"/>
        </svg>
    </a>

    {% include ga.html %}

    <script>
    (function() {
        var nav = document.getElementById('mainNav');
        var header = document.querySelector('.intro-header');
        var btn = document.getElementById('scrollTop');
        var scrolling = false;
        if (!nav || !header) return;
        function onScroll() {
            if (scrolling) return;
            var scrolled = window.scrollY > header.offsetHeight - nav.offsetHeight;
            nav.classList.toggle('nav-scrolled', scrolled);
            if (btn) btn.classList.toggle('visible', scrolled);
        }
        window.addEventListener('scroll', onScroll);
        onScroll();
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                scrolling = true;
                btn.classList.remove('visible');
                nav.classList.remove('nav-scrolled');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(function() { scrolling = false; }, 800);
            });
        }
    })();
    </script>

</body>

</html>
